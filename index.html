<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>SSCC Scanner Debug</title>

<script src="zxing.js"></script> <!-- Twój pobrany plik UMD -->

<style>
body{font-family:Arial;padding:10px;}
canvas{max-width:100%;border:1px solid black;margin-top:10px;}
#status{padding:10px;background:#eee;margin-top:10px;}
#debug{margin-top:10px;background:black;color:#00ff00;padding:10px;font-size:12px;height:200px;overflow:auto;}
.zoom{border:2px solid red;margin-top:5px;}
</style>

</head>
<body>

<h2>SSCC Scanner DEBUG</h2>

<input type="file" id="fileInput" accept="image/*">
<div id="status">Czekam na zdjęcie</div>

<canvas id="canvas"></canvas>

<h3>Debug log</h3>
<div id="debug"></div>






<script>

document.addEventListener("DOMContentLoaded", function(){

const debugBox = document.getElementById("debug");
const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

function log(msg){
  const line = document.createElement("div");
  line.textContent = msg;
  debugBox.appendChild(line);
}

log("Start strony");

if(window.ZXingBrowser){
  log("ZXingBrowser OK");
}else{
  log("ZXingBrowser NIE DZIAŁA");
}

fileInput.addEventListener("change", handleFile);

function setStatus(text){
  status.innerHTML = text;
  log("STATUS: " + text);
}

function handleFile(e){

  log("EVENT change działa");

  const file = e.target.files[0];

  if(!file){
    log("Brak pliku");
    return;
  }

  setStatus("Wczytuję zdjęcie...");

  const img = new Image();

  img.onload = async function(){

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    log("Obraz narysowany");

    try{

      const reader = new ZXingBrowser.BrowserMultiFormatReader();

      const result = await reader.decodeFromImage(img);

      if(result){

        log("Kod: " + result.text);

        if(result.text.startsWith("0035")){
          setStatus("SSCC: " + result.text);
        }else{
          setStatus("Kod: " + result.text);
        }

      }else{
        setStatus("Brak wyniku");
      }

    }
    catch(err){

      log("Błąd dekodowania");
      log(err);

      setStatus("Nie znaleziono kodu");

    }

  }

  img.src = URL.createObjectURL(file);

}

});

</script>




  

</body>
</html>
