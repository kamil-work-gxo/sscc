<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>SSCC Scanner</title>

<script src="https://unpkg.com/@zxing/browser"></script>

<style>

body{
font-family:Arial;
padding:10px;
}

canvas{
max-width:100%;
border:1px solid black;
margin-top:10px;
}

#status{
padding:10px;
background:#eee;
margin-top:10px;
}

.zoom{
width:200px;
border:3px solid red;
margin:5px;
}

</style>

</head>

<body>

<h2>SSCC scanner</h2>

<input type="file" id="fileInput" accept="image/*">

<div id="status">
Czekam na zdjęcie
</div>

<canvas id="canvas"></canvas>

<h3>Debug – wycięte etykiety</h3>

<div id="zooms"></div>

<script>

const fileInput = document.getElementById("fileInput")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const status = document.getElementById("status")
const zoomContainer = document.getElementById("zooms")

fileInput.addEventListener("change", handleFile)

function setStatus(text){
status.innerHTML = text
}

function resizeImage(img){

const maxWidth = 1600

if(img.width <= maxWidth){
return img
}

const scale = maxWidth / img.width

const c = document.createElement("canvas")
c.width = maxWidth
c.height = img.height * scale

const rctx = c.getContext("2d")
rctx.drawImage(img,0,0,c.width,c.height)

const resized = new Image()
resized.src = c.toDataURL()

return resized

}

async function handleFile(e){

zoomContainer.innerHTML=""

const file = e.target.files[0]

if(!file){
setStatus("Brak pliku")
return
}

setStatus("Ładowanie zdjęcia...")

const img = new Image()
img.src = URL.createObjectURL(file)

img.onload = ()=>{

const resized = resizeImage(img)

resized.onload = ()=>{

canvas.width = resized.width
canvas.height = resized.height

ctx.drawImage(resized,0,0)

scan(resized)

}

}

}

async function scan(img){

setStatus("Skanuję kod kreskowy...")

const hints = new Map()
hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS, [
ZXingBrowser.BarcodeFormat.CODE_128
])

const reader = new ZXingBrowser.BrowserMultiFormatReader(hints)

try{

const result = await reader.decodeFromImageElement(img)

if(!result){
setStatus("Nie znaleziono kodu")
return
}

if(result.text.startsWith("0035")){

setStatus("SSCC wykryty:<br><b>"+result.text+"</b>")
drawBoundingBox(result)

}else{

setStatus("Wykryto Code128 ale nie SSCC:<br>"+result.text)

}

}catch(err){

setStatus("Nie znaleziono kodu kreskowego")

}

}

function drawBoundingBox(result){

const points = result.resultPoints

const xs = points.map(p=>p.x)
const ys = points.map(p=>p.y)

const minX = Math.min(...xs)
const maxX = Math.max(...xs)

const minY = Math.min(...ys)
const maxY = Math.max(...ys)

const padding = 120

const x = minX - padding/2
const y = minY - padding/2
const w = (maxX-minX)+padding
const h = (maxY-minY)+padding

ctx.strokeStyle="red"
ctx.lineWidth=5

ctx.strokeRect(x,y,w,h)

createZoom(x,y,w,h)

}

function createZoom(x,y,w,h){

const zoom = document.createElement("canvas")

zoom.width = w
zoom.height = h

const zctx = zoom.getContext("2d")

zctx.drawImage(canvas,x,y,w,h,0,0,w,h)

zoom.className="zoom"

zoomContainer.appendChild(zoom)

}

</script>

</body>
</html>
