<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">
<title>SSCC Scanner Debug</title>


<script src="./zxing.js"></script>


<script>
window.onload = () => {
  if(window.ZXing){
    document.body.innerHTML += "<p>ZXing OK</p>"
  }else{
    document.body.innerHTML += "<p>ZXing NIE DZIAŁA</p>"
  }
}
</script>


  

  
<style>
body{font-family:Arial;padding:10px;}
canvas{max-width:100%;border:1px solid black;margin-top:10px;}
#status{padding:10px;background:#eee;margin-top:10px;}
#debug{
margin-top:10px;
background:black;
color:#00ff00;
padding:10px;
font-size:12px;
height:200px;
overflow:auto;
}
</style>
</head>

<body>

<h2>SSCC Scanner DEBUG</h2>

<input type="file" id="fileInput" accept="image/*">
<div id="status">Czekam na zdjęcie</div>

<canvas id="canvas"></canvas>

<h3>Debug log</h3>
<div id="debug"></div>

<script>

const debugBox = document.getElementById("debug");

function log(msg){
  const line = document.createElement("div");
  line.textContent = msg;
  debugBox.appendChild(line);
}

log("Start strony");

if(window.ZXing){
  log("ZXing załadowany");
}else{
  log("BŁĄD: ZXing nie załadowany");
}

const fileInput = document.getElementById("fileInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

fileInput.addEventListener("change", handleFile);

function setStatus(text){
  status.innerHTML = text;
  log("STATUS: " + text);
}

function handleFile(e){

  log("Wybrano plik");

  const file = e.target.files[0];

  if(!file){
    log("Brak pliku");
    return;
  }

  log("Nazwa: " + file.name);
  log("Rozmiar: " + file.size);

  const url = URL.createObjectURL(file);

  const img = new Image();

  img.onload = ()=>{

    log("Obraz załadowany");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    log("Obraz narysowany na canvas");

    scan(url);

  }

  img.src = url;

}

async function scan(url){

  setStatus("Skanuję kod kreskowy...");

  log("Start dekodowania");

  try{

    const reader = new ZXing.BrowserMultiFormatReader();

    log("Reader utworzony");

    const result = await reader.decodeFromImageUrl(url);

    log("ZXing zwrócił wynik");

    if(result){
      log("Kod: " + result.text);

      if(result.text.startsWith("0035")){
        setStatus("SSCC: " + result.text);
      }else{
        setStatus("Kod wykryty ale nie SSCC");
      }

    }else{
      setStatus("Brak wyniku");
    }

  }
  catch(err){

    log("Błąd ZXing:");
    log(err);

    setStatus("Nie znaleziono kodu");

  }

}

</script>

</body>
</html>
