<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>SSCC Scanner</title>

<script src="https://unpkg.com/@zxing/browser"></script>

<style>

body{
font-family:Arial;
padding:10px;
}

canvas{
max-width:100%;
border:1px solid black;
margin-top:10px;
}

#status{
padding:10px;
background:#eee;
margin-top:10px;
}

.zoom{
width:200px;
border:3px solid red;
margin:5px;
}

</style>

</head>

<body>

<h2>SSCC scanner</h2>

<input type="file" id="fileInput" accept="image/*">

<div id="status">
Czekam na zdjęcie
</div>

<canvas id="canvas"></canvas>

<h3>Debug – wycięte etykiety</h3>

<div id="zooms"></div>

<script>

const fileInput = document.getElementById("fileInput")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const status = document.getElementById("status")
const zoomContainer = document.getElementById("zooms")

fileInput.addEventListener("change", handleFile)

function setStatus(text){

status.innerHTML = text

}

async function handleFile(e){

zoomContainer.innerHTML=""

const file = e.target.files[0]

if(!file){

setStatus("Brak pliku")

return

}

setStatus("Ładowanie zdjęcia...")

const img = new Image()

img.src = URL.createObjectURL(file)

img.onload = async ()=>{

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

setStatus("Skanuję kod kreskowy...")

scan(img)

}

}

async function scan(img){

const reader = new ZXingBrowser.BrowserMultiFormatReader()

try{

const result = await reader.decodeFromImageElement(img)

setStatus("Znaleziony kod: "+result.text)

drawBoundingBox(result)

}catch(err){

setStatus("Nie znaleziono kodu kreskowego")

}

}

function drawBoundingBox(result){

const points = result.resultPoints

ctx.strokeStyle="red"
ctx.lineWidth=5

const xs = points.map(p=>p.x)
const ys = points.map(p=>p.y)

const minX = Math.min(...xs)
const maxX = Math.max(...xs)

const minY = Math.min(...ys)
const maxY = Math.max(...ys)

const w = maxX-minX
const h = maxY-minY

ctx.strokeRect(minX,minY,w,h)

createZoom(minX,minY,w,h)

}

function createZoom(x,y,w,h){

const zoom = document.createElement("canvas")

zoom.width = w
zoom.height = h

const zctx = zoom.getContext("2d")

zctx.drawImage(canvas,x,y,w,h,0,0,w,h)

zoom.className="zoom"

zoomContainer.appendChild(zoom)

}

</script>

</body>
</html>
