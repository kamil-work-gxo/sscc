<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="UTF-8">

<title>SSCC Scanner</title>

<script src="https://unpkg.com/@zxing/library"></script>

<style>

body{
font-family:Arial;
padding:10px;
}

canvas{
max-width:100%;
border:1px solid black;
margin-top:10px;
}

#status{
padding:10px;
background:#eee;
margin-top:10px;
}

</style>

</head>

<body>

<h2>SSCC scanner</h2>

<input type="file" id="fileInput" accept="image/*">

<div id="status">
Czekam na zdjęcie
</div>

<canvas id="canvas"></canvas>

<script>

const fileInput = document.getElementById("fileInput")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const status = document.getElementById("status")

fileInput.addEventListener("change", handleFile)

function setStatus(text){
status.innerHTML=text
}

function handleFile(e){

const file = e.target.files[0]

if(!file){
setStatus("Brak pliku")
return
}

setStatus("Ładowanie zdjęcia...")

const img = new Image()
img.src = URL.createObjectURL(file)

img.onload = ()=>{

canvas.width = img.width
canvas.height = img.height

ctx.drawImage(img,0,0)

scan()

}

}

async function scan(){

setStatus("Skanuję kod kreskowy...")

const codeReader = new ZXing.BrowserMultiFormatReader()

try{

const result = await codeReader.decodeFromCanvas(canvas)

if(result.text.startsWith("0035")){

setStatus("SSCC wykryty:<br><b>"+result.text+"</b>")

}else{

setStatus("Wykryto kod ale nie SSCC:<br>"+result.text)

}

}catch(err){

setStatus("Nie znaleziono kodu kreskowego")

}

}

</script>

</body>
</html>
